        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #000000 0%, #0a0a2a 50%, #001f3f 100%);
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;

            width: 100%;
            height: 100%;

            flex-direction: column;

            padding: env(safe-area-inset-top) 16px 12px 16px;

            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 10;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .profile-pic-small {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            object-fit: cover;
            border: 1px solid rgba(0, 255, 255, 0.5);
            background: #000;
        }

        .header-title {
            font-family: 'Orbitron', monospace;
            font-size: 18px;
            font-weight: 700;
            color: #00ffff;
            text-shadow: 0 0 8px rgba(0,255,255,0.5);
            letter-spacing: 1px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            background: rgba(0,255,255,0.1);
            border: 1px solid rgba(0,255,255,0.3);
            border-radius: 10px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00ffff;
            cursor: pointer;
            transition: all 0.15s;
            font-size: 18px;
        }

        .header-icon:active {
            transform: scale(0.96);
            background: rgba(0,255,255,0.2);
        }

        /* Login Card */
        .login-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(135deg, #000000, #001133);
            overflow-y: auto;
        }

        .login-box {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            border-radius: 14px;
            padding: 35px 25px;
            width: 100%;
            max-width: 340px;
            border: 1px solid rgba(0,255,255,0.4);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .profile-picture {
            text-align: center;
            margin-bottom: 20px;
        }

        .profile-picture img {
            width: 88px;
            height: 88px;
            border-radius: 14px;
            object-fit: cover;
            border: 2px solid rgba(0,255,255,0.5);
            background: #000;
        }

        .login-box h2 {
            color: #00ffff;
            text-align: center;
            margin-bottom: 25px;
            font-size: 24px;
            font-family: 'Orbitron', monospace;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(0,255,255,0.3);
            border-radius: 10px;
            color: #00ffff;
            font-size: 14px;
            transition: all 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00ffff;
            box-shadow: 0 0 12px rgba(0,255,255,0.2);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #0066cc, #00ccff);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s;
            position: relative;
        }

        .login-btn:active {
            transform: scale(0.97);
        }

        .login-btn.loading {
            opacity: 0.7;
            cursor: wait;
        }

        .login-btn .btn-text {
            display: inline-block;
        }

        .login-btn .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .login-btn.loading .btn-text {
            visibility: hidden;
        }

        .login-btn.loading .spinner {
            display: block;
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Main Layout dengan Sidebar */
        .main-layout {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* Sidebar */

            width: 280px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(0,255,255,0.2);
            display: flex;
            flex-direction: column;
            transform: translateX(-100%);
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 20;
            width: 280px;
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(0,255,255,0.2);
        }

        .sidebar-header h3 {
            color: #00ffff;
            font-family: 'Orbitron', monospace;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .new-chat-sidebar {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #0066cc, #00ccff);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.15s;
        }

        .new-chat-sidebar:active {
            transform: scale(0.97);
        }

        .chat-history-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .history-item {
            padding: 12px;
            background: rgba(0,255,255,0.05);
            border: 1px solid rgba(0,255,255,0.15);
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .history-item:active {
            transform: scale(0.98);
            background: rgba(0,255,255,0.1);
        }

        .history-item.active {
            border-color: #00ffff;
            background: rgba(0,255,255,0.1);
        }

        .history-title {
            color: #00ffff;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-date {
            color: rgba(0,255,255,0.5);
            font-size: 10px;
        }

            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            min-height: 0;
            background: linear-gradient(180deg, #000000 0%, #0a0a2a 50%, #001133 100%);
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            min-height: 0;
        }

        .message {
            margin-bottom: 12px;
            display: flex;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 14px;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.4;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #0066cc, #00ccff);
            color: white;
            border-bottom-right-radius: 4px;
        }

            background: rgba(0,0,0,0.7);
            border: 1px solid rgba(0,255,255,0.3);
            color: #ccffff;
            border-bottom-left-radius: 4px;
        }

        .message-image {
            max-width: 180px;
            max-height: 180px;
            border-radius: 8px;
            margin-top: 6px;
            cursor: pointer;
        }

        /* Code Block Styling */
        .code-block {
            position: relative;
            margin: 8px 0;
            border-radius: 8px;
            overflow: hidden;
        }

        .code-block pre {
            margin: 0;
            padding: 12px;
            background: #0a0a0a;
            overflow-x: auto;
            font-size: 12px;
            border-radius: 8px;
        }

        .code-block code {
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 12px;
        }

        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,255,255,0.2);
            border: 1px solid rgba(0,255,255,0.3);
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 11px;
            color: #00ffff;
            cursor: pointer;
            transition: all 0.15s;
        }

        .copy-btn:active {
            transform: scale(0.95);
            background: rgba(0,255,255,0.3);
        }

        /* Image Attachment Preview */
        .image-preview-attach {
            background: rgba(0,0,0,0.8);
            border-radius: 12px;
            padding: 8px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(0,255,255,0.3);
        }

        .image-preview-attach img {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            object-fit: cover;
        }

        .image-preview-attach .preview-text {
            flex: 1;
            font-size: 12px;
            color: #00ffff;
        }

        .image-preview-attach .remove-image {
            background: rgba(255,0,0,0.2);
            border: none;
            color: #ff6666;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
        }

        /* Input Area */
        .input-area {
            background: rgba(0,0,0,0.95);
            padding: 12px 16px;
            border-top: 1px solid rgba(0,255,255,0.2);
            backdrop-filter: blur(10px);
            flex-shrink: 0;
            position: relative;
            z-index: 10;
        }

        .image-pending {
            margin-bottom: 8px;
        }

        .input-wrapper {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .input-wrapper textarea {
            flex: 1;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(0,255,255,0.3);
            border-radius: 20px;
            padding: 12px 16px;
            color: #00ffff;
            font-family: inherit;
            font-size: 15px;
            resize: none;
            max-height: 100px;
            transition: all 0.2s;
            line-height: 1.4;
        }

        .input-wrapper textarea:focus {
            outline: none;
            border-color: #00ffff;
            box-shadow: 0 0 8px rgba(0,255,255,0.2);
        }

        .action-buttons {
            display: flex;
            gap: 6px;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            padding: 0;
            background: rgba(0,255,255,0.1);
            border: 1px solid rgba(0,255,255,0.3);
            border-radius: 50%;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00ffff;
            cursor: pointer;
            transition: all 0.15s;
        }

        .icon-btn:active {
            transform: scale(0.95);
            background: rgba(0,255,255,0.2);
        }

        .send-btn {
            width: auto;
            padding: 0 20px;
            border-radius: 22px;
        }

        .send-btn.disabled, .stop-btn.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .stop-btn {
            background: rgba(255,0,0,0.2);
            border-color: rgba(255,0,0,0.3);
            color: #ff6666;
        }

        .messages-area::-webkit-scrollbar {
            width: 4px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.3);
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: #00ffff;
            border-radius: 4px;
        }

        .loading-indicator {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #00ffff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        .camera-modal, .image-preview-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .camera-modal.active, .image-preview-modal.active {
            display: flex;
        }

        .camera-container {
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            flex-direction: column;
        }

        video {
            flex: 1;
            width: 100%;
            object-fit: cover;
        }

        .camera-controls {
            display: flex;
            gap: 15px;
            padding: 20px;
            background: rgba(0,0,0,0.9);
        }

        .preview-img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }

        .close-preview {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            border: 1px solid #00ffff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            color: #00ffff;
            cursor: pointer;
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 15;
            display: none;
        }

        .menu-overlay.active {
            display: block;
        }

        .notification {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            border: 1px solid #00ffff;
            border-radius: 30px;
            padding: 8px 20px;
            font-size: 12px;
            color: #00ffff;
            display: none;
            z-index: 4000;
            white-space: nowrap;
        }
    </style>
</head>

            setTimeout(() => {
                if (!loaded) {
                    const defaultSrc = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23001a33'/%3E%3Ctext x='50' y='68' font-size='48' text-anchor='middle' fill='%2300ffff'%3E🦀%3C/text%3E%3C/svg%3E";
                    if (imgElement) imgElement.src = defaultSrc;
                    if (headerImgElement) headerImgElement.src = defaultSrc;
                }
            }, 500);
        }
        
        function showNotification(msg) {
            const n = document.getElementById('notification');
            if (n) {
                n.textContent = msg;
                n.style.display = 'block';
                setTimeout(() => n.style.display = 'none', 2000);
            }
        }
        
        // Format message with code blocks
        function formatMessage(content) {
            const codeBlockRegex = /```(\w*)\n([\s\S]*?)```/g;
            let formatted = content;
            let parts = [];
            let lastIndex = 0;
            let match;
            
            while ((match = codeBlockRegex.exec(content)) !== null) {
                if (match.index > lastIndex) {
                    parts.push({ type: 'text', content: content.substring(lastIndex, match.index) });
                }
                parts.push({ type: 'code', language: match[1] || 'plaintext', code: match[2] });
                lastIndex = match.index + match[0].length;
            }
            
            if (lastIndex < content.length) {
                parts.push({ type: 'text', content: content.substring(lastIndex) });
            }
            
            return parts;
        }
        
        // Add message to UI with code highlighting
        function addMessage(sender, content, imageUrl = null) {
            const messagesArea = document.getElementById('messagesArea');
            if (!messagesArea) return;
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            if (imageUrl) {
                const img = document.createElement('img');
                img.src = imageUrl;
                img.className = 'message-image';
                img.onclick = () => openImagePreview(imageUrl);
                contentDiv.appendChild(img);
            }
            
            if (sender === 'ai') {
                const parts = formatMessage(content);
                for (const part of parts) {
                    if (part.type === 'text') {
                        const textNode = document.createElement('div');
                        textNode.innerHTML = part.content.replace(/\n/g, '<br>');
                        contentDiv.appendChild(textNode);
                    } else if (part.type === 'code') {
                        const codeBlock = document.createElement('div');
                        codeBlock.className = 'code-block';
                        const pre = document.createElement('pre');
                        const code = document.createElement('code');
                        code.className = `language-${part.language}`;
                        code.textContent = part.code;
                        pre.appendChild(code);
                        codeBlock.appendChild(pre);
                        
                        const copyBtn = document.createElement('button');
                        copyBtn.className = 'copy-btn';
                        copyBtn.innerHTML = '<i class="fas fa-copy"></i> Copy';
                        copyBtn.onclick = () => {
                            navigator.clipboard.writeText(part.code);
                            showNotification('Copied!');
                        };
                        codeBlock.appendChild(copyBtn);
                        contentDiv.appendChild(codeBlock);
                    }
                }
            } else {
                const textNode = document.createElement('div');
                textNode.innerHTML = content.replace(/\n/g, '<br>');
                contentDiv.appendChild(textNode);
            }
            
            messageDiv.appendChild(contentDiv);
            messagesArea.appendChild(messageDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
            
            // Save to current conversation
            if (currentChatId && currentUser) {
                if (!conversations[currentChatId]) {
                    conversations[currentChatId] = [];
                }
                conversations[currentChatId].push({ sender, content, imageUrl, timestamp: Date.now() });
                saveConversationToFirebase();
                updateChatHistoryList();
            }
        }
        
        function addLoadingMessage() {
            const messagesArea = document.getElementById('messagesArea');
            if (!messagesArea) return;
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message ai';
            loadingDiv.id = 'loadingMessage';
            loadingDiv.innerHTML = '<div class="message-content"><div class="loading-indicator"></div> Thinking...</div>';
            messagesArea.appendChild(loadingDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
            isThinking = true;
            document.getElementById('stopBtn').style.display = 'flex';
            document.getElementById('sendBtn').style.display = 'none';
        }
        
        function removeLoadingMessage() {
            const loading = document.getElementById('loadingMessage');
            if (loading) loading.remove();
            isThinking = false;
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('sendBtn').style.display = 'flex';
        }
        
        function stopThinking() {
            if (isThinking) {
                removeLoadingMessage();
                showNotification('Response stopped');
            }
        }
        
        // Groq API call
        async function callGroqAPI(userMessage, username, imageContext = null) {
            try {
                let systemPrompt = `${aiPersonality}\n\nUsername user: ${username}`;
                
                if (imageContext && imageContext !== "Image cannot be analyzed" && imageContext !== "No text detected") {
                    systemPrompt += `\n\nUser mengirim gambar dengan teks terdeteksi: "${imageContext.substring(0, 300)}"`;
                }
                
                const response = await fetch(GROQ_API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${GROQ_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: userMessage || (imageContext ? "Apa yang bisa kamu lihat dari gambar ini?" : "Halo") }
                        ],
                        temperature: 0.9,
                        max_tokens: 1000
                    })
                });
                
                if (!response.ok) throw new Error(`API Error: ${response.status}`);
                
                const data = await response.json();
                if (data.choices && data.choices[0]?.message?.content) {
                    return data.choices[0].message.content;
                }
                return `🦀 Maaf ${username}, aku error. Coba lagi! 🌊`;
            } catch (error) {
                console.error('Groq API error:', error);
                return `🦀 Error koneksi, ${username}. Coba lagi! 🌊`;
            }
        }
        
        async function sendMessage(message, imageData = null) {
            if ((!message.trim() && !imageData) || isThinking) return;
            
            if (message.trim()) {
                addMessage("user", message);
            }
            
            if (imageData) {
                addMessage("user", "[Image]", imageData);
                pendingImage = null;
                document.getElementById('imagePending').style.display = 'none';
            }
            
            const messageInput = document.getElementById('messageInput');
            if (messageInput) {
                messageInput.value = '';
                messageInput.style.height = 'auto';
            }
            
            addLoadingMessage();
            
            let imageContext = null;
            const finalImage = imageData || pendingImage;
            if (finalImage) {
                try {
                    const { data: { text } } = await Tesseract.recognize(finalImage, 'eng+ind');
                    imageContext = text || "No text detected";
                } catch (error) {
                    imageContext = "Image cannot be analyzed";
                }
                if (!imageData) pendingImage = null;
                document.getElementById('imagePending').style.display = 'none';
            }
            
            const response = await callGroqAPI(message, currentUser, imageContext);
            removeLoadingMessage();
            addMessage("ai", response);
        }
        
        // Conversation Management
        function createNewChat() {
            currentChatId = Date.now().toString();
            conversations[currentChatId] = [];
            currentConversation = [];
            document.getElementById('messagesArea').innerHTML = '';
            addMessage("ai", `🦀 New conversation started. What would you like to discuss, ${currentUser}? 🌊`);
            saveConversationToFirebase();
            updateChatHistoryList();
        }
        
        function loadChat(chatId) {
            if (isThinking) return;
            currentChatId = chatId;
            currentConversation = conversations[chatId] || [];
            const messagesArea = document.getElementById('messagesArea');
            messagesArea.innerHTML = '';
            
            if (currentConversation.length === 0) {
                addMessage("ai", `🦀 Conversation loaded. What would you like to discuss, ${currentUser}? 🌊`);
            } else {
                for (const msg of currentConversation) {
                    const messageDiv = document.createElement('div');
                    messageDiv.className = `message ${msg.sender}`;
                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'message-content';
                    if (msg.imageUrl) {
                        const img = document.createElement('img');
                        img.src = msg.imageUrl;
                        img.className = 'message-image';
                        img.onclick = () => openImagePreview(msg.imageUrl);
                        contentDiv.appendChild(img);
                    }
                    if (msg.sender === 'ai') {
                        const parts = formatMessage(msg.content);
                        for (const part of parts) {
                            if (part.type === 'text') {
                                const textNode = document.createElement('div');
                                textNode.innerHTML = part.content.replace(/\n/g, '<br>');
                                contentDiv.appendChild(textNode);
                            } else if (part.type === 'code') {
                                const codeBlock = document.createElement('div');
                                codeBlock.className = 'code-block';
                                const pre = document.createElement('pre');
                                const code = document.createElement('code');
                                code.className = `language-${part.language}`;
                                code.textContent = part.code;
                                pre.appendChild(code);
                                codeBlock.appendChild(pre);
                                const copyBtn = document.createElement('button');
                                copyBtn.className = 'copy-btn';
                                copyBtn.innerHTML = '<i class="fas fa-copy"></i> Copy';
                                copyBtn.onclick = () => {
                                    navigator.clipboard.writeText(part.code);
                                    showNotification('Copied!');
                                };
                                codeBlock.appendChild(copyBtn);
                                contentDiv.appendChild(codeBlock);
                            }
                        }
                    } else {
                        const textNode = document.createElement('div');
                        textNode.innerHTML = msg.content.replace(/\n/g, '<br>');
                        contentDiv.appendChild(textNode);
                    }
                    messageDiv.appendChild(contentDiv);
                    messagesArea.appendChild(messageDiv);
                }
            }
            messagesArea.scrollTop = messagesArea.scrollHeight;
            updateChatHistoryList();
            closeMenu();
        }
        
        function saveConversationToFirebase() {
            if (currentUser && db && currentChatId && conversations[currentChatId]) {
                db.ref(`conversations/${currentUser}/${currentChatId}`).set(conversations[currentChatId]);
            }
        }
        
        function loadConversationsFromFirebase() {
            if (!currentUser || !db) return;
            db.ref(`conversations/${currentUser}`).once('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    conversations = data;
                    const chatIds = Object.keys(conversations);
                    if (chatIds.length > 0) {
                        currentChatId = chatIds[0];
                        loadChat(currentChatId);
                    } else {
                        createNewChat();
                    }
                } else {
                    createNewChat();
                }
                updateChatHistoryList();
            });
        }
        
        function updateChatHistoryList() {
            const listContainer = document.getElementById('chatHistoryList');
            if (!listContainer) return;
            listContainer.innerHTML = '';
            const chatIds = Object.keys(conversations).reverse();
            for (const id of chatIds) {
                const firstMsg = conversations[id]?.find(m => m.sender === 'user');
                const title = firstMsg ? (firstMsg.content.substring(0, 30) + (firstMsg.content.length > 30 ? '...' : '')) : 'Empty chat';
                const date = new Date(parseInt(id)).toLocaleString();
                const item = document.createElement('div');
                item.className = `history-item ${currentChatId === id ? 'active' : ''}`;
                item.innerHTML = `
                    <div class="history-title">${escapeHtml(title)}</div>
                    <div class="history-date">${date}</div>
                `;
                item.onclick = () => loadChat(id);
                listContainer.appendChild(item);
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Camera Functions
        async function startCamera() {
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                document.getElementById('video').srcObject = currentStream;
                document.getElementById('cameraModal').classList.add('active');
            } catch (error) {
                showNotification('Camera access denied!');
            }
        }
        
        function stopCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
            document.getElementById('cameraModal').classList.remove('active');
        }
        
        async function captureImage() {
            const video = document.getElementById('video');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const imageData = canvas.toDataURL('image/jpeg');
            stopCamera();
            pendingImage = imageData;
            document.getElementById('pendingImagePreview').src = imageData;
            document.getElementById('imagePending').style.display = 'block';
        }
        
        function handleImageUpload() {
            document.getElementById('imageFileInput').click();
        }
        
        function openImagePreview(src) {
            document.getElementById('previewImage').src = src;
            document.getElementById('imagePreviewModal').classList.add('active');
        }
        
        // Menu Functions
        function openMenu() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('menuOverlay').classList.add('active');
        }
        
        function closeMenu() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('menuOverlay').classList.remove('active');
        }
        
        // Login System
        function handleLogin() {
            const u = document.getElementById('loginUsername').value.trim();
            const p = document.getElementById('loginPassword').value.trim();
            if (!u || !p) return showNotification('Fill all fields');
            
            const loginBtn = document.getElementById('loginBtn');
            loginBtn.classList.add('loading');
            
            if (db) {
                db.ref('registered_users/' + u).once('value').then(s => {
                    const d = s.val();
                    setTimeout(() => {
                        if (d && d.password === p && new Date().getTime() < d.expiry) {
                            currentUser = u;
                            localStorage.setItem('current_user', u);
                            localStorage.setItem('user_expiry', d.expiry);
                            document.getElementById('loginContainer').style.display = 'none';
                            document.getElementById('headerBar').style.display = 'flex';
                            document.getElementById('mainLayout').style.display = 'flex';
                            loginBtn.classList.remove('loading');
                            
                            if (d.avatar) {
                                document.getElementById('loginProfilePic').src = d.avatar;
                                document.getElementById('headerProfilePic').src = d.avatar;
                            }
                            
                            loadConversationsFromFirebase();
                            showNotification(`Welcome ${u}`);
                        } else {
                            loginBtn.classList.remove('loading');
                            showNotification('Invalid credentials or expired');
                        }
                    }, 1000);
                }).catch(() => {
                    loginBtn.classList.remove('loading');
                    showNotification('Connection error');
                });
            } else {
                setTimeout(() => {
                    loginBtn.classList.remove('loading');
                    showNotification('Firebase not ready');
                }, 1000);
            }
        }
        
        function logout() {
            localStorage.removeItem('current_user');
            localStorage.removeItem('user_expiry');
            document.getElementById('mainLayout').style.display = 'none';
            document.getElementById('headerBar').style.display = 'none';
            document.getElementById('loginContainer').style.display = 'flex';
            currentUser = null;
            showNotification('Logged out');
        }
        
        // Keyboard handling
        function fixKeyboardScroll() {
            const textarea = document.getElementById('messageInput');
            if (!textarea) return;
            textarea.addEventListener('focus', () => {
                setTimeout(() => {
                    const messagesArea = document.getElementById('messagesArea');
                    if (messagesArea) messagesArea.scrollTop = messagesArea.scrollHeight;
                    textarea.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 100);
            });
        }
        
        // Event Listeners
        document.addEventListener('DOMContentLoaded', () => {
            loadProfileImage();
            fixKeyboardScroll();
            
            document.getElementById('loginBtn')?.addEventListener('click', handleLogin);
            document.getElementById('logoutIconBtn')?.addEventListener('click', logout);
            document.getElementById('menuToggleBtn')?.addEventListener('click', openMenu);
            document.getElementById('menuOverlay')?.addEventListener('click', closeMenu);
            document.getElementById('newChatSidebarBtn')?.addEventListener('click', () => { createNewChat(); closeMenu(); });
            document.getElementById('sendBtn')?.addEventListener('click', () => sendMessage(document.getElementById('messageInput')?.value || ''));
            document.getElementById('stopBtn')?.addEventListener('click', stopThinking);
            document.getElementById('cameraBtn')?.addEventListener('click', startCamera);
            document.getElementById('imageUploadBtn')?.addEventListener('click', handleImageUpload);
            document.getElementById('captureBtn')?.addEventListener('click', captureImage);
            document.getElementById('closeCameraBtn')?.addEventListener('click', stopCamera);
            document.getElementById('removeImageBtn')?.addEventListener('click', () => {
                pendingImage = null;
                document.getElementById('imagePending').style.display = 'none';
            });
            document.getElementById('closePreviewBtn')?.addEventListener('click', () => document.getElementById('imagePreviewModal').classList.remove('active'));
            document.getElementById('imagePreviewModal')?.addEventListener('click', (e) => {
                if (e.target === document.getElementById('imagePreviewModal')) 
                    document.getElementById('imagePreviewModal').classList.remove('active');
            });
            
            const textarea = document.getElementById('messageInput');
            if (textarea) {
                textarea.addEventListener('input', function() {
                    this.style.height = 'auto';
                    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
                });
                textarea.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey && !isThinking) {
                        e.preventDefault();
                        sendMessage(textarea.value);
                    }
                });
            }
            
            document.getElementById('imageFileInput')?.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        pendingImage = event.target.result;
                        document.getElementById('pendingImagePreview').src = pendingImage;
                        document.getElementById('imagePending').style.display = 'block';
                    };
                    reader.readAsDataURL(file);
                }
                e.target.value = '';
            });
            
            const saved = localStorage.getItem('current_user');
            if (saved) {
                const exp = localStorage.getItem('user_expiry');
                if (exp && new Date().getTime() < parseInt(exp)) {
                    currentUser = saved;
                    document.getElementById('loginContainer').style.display = 'none';
                    document.getElementById('headerBar').style.display = 'flex';
                    document.getElementById('mainLayout').style.display = 'flex';
                    loadConversationsFromFirebase();
                }
            }
            
            if ('virtualKeyboard' in navigator) {
                navigator.virtualKeyboard.overlaysContent = true;
            }
            
            let originalHeight = window.innerHeight;
            window.addEventListener('resize', () => {
                const messagesArea = document.getElementById('messagesArea');
                if (window.innerHeight < originalHeight && messagesArea) {
                    setTimeout(() => messagesArea.scrollTop = messagesArea.scrollHeight, 100);
                }
                originalHeight = window.innerHeight;
            });
        });
    </script>
</body>
