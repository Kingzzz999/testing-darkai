        // LOAD PROFILE IMAGE
        function loadProfileImage() {
            const imgElement = document.getElementById('loginProfilePic');
            const headerImgElement = document.getElementById('headerProfilePic');
            const possibleNames = ['login.jpg', 'login.jpeg', 'login.png'];
            let loaded = false;
            for (let i = 0; i < possibleNames.length; i++) {

                        if (imgElement) imgElement.src = imgSrc;
                        if (headerImgElement) headerImgElement.src = imgSrc;
                        loaded = true;
                    }
                };
                img.onerror = function() {};
                img.src = possibleNames[i];
            }
            setTimeout(() => {

        // FORMAT MESSAGE (CODE BLOCKS)
        function formatMessage(content) {
            const codeBlockRegex = /```(\w*)\n([\s\S]*?)```/g;
            let parts = [];
            let lastIndex = 0;
            let match;
            while ((match = codeBlockRegex.exec(content)) !== null) {
                if (match.index > lastIndex) {
                    parts.push({ type: 'text', content: content.substring(lastIndex, match.index) });
                }
                parts.push({ type: 'code', language: match[1] || 'plaintext', code: match[2] });
                lastIndex = match.index + match[0].length;
            }
            if (lastIndex < content.length) {
                parts.push({ type: 'text', content: content.substring(lastIndex) });
            }
            return parts;
        }

        function addMessage(sender, content) {
            const messagesArea = document.getElementById('messagesArea');
            if (!messagesArea) return;
            
            const messageDiv = document.createElement('div');

                    } else if (part.type === 'code') {
                        const codeBlock = document.createElement('div');
                        codeBlock.className = 'code-block';
                        const pre = document.createElement('pre');
                        const code = document.createElement('code');
                        code.className = `language-${part.language}`;
                        code.textContent = part.code;
                        pre.appendChild(code);
                        codeBlock.appendChild(pre);
                        const copyBtn = document.createElement('button');
                        copyBtn.className = 'copy-btn';
                        copyBtn.innerHTML = '<i class="fas fa-copy"></i> Copy';
                        copyBtn.onclick = () => {
                            navigator.clipboard.writeText(part.code);

                        };
                        codeBlock.appendChild(copyBtn);
                        contentDiv.appendChild(codeBlock);
                    }
                }
            } else {
                const textNode = document.createElement('div');

                conversations[currentChatId].push({ sender, content, timestamp: Date.now() });
                db.ref(`conversations/${currentUser}/${currentChatId}`).set(conversations[currentChatId]);
                updateChatHistoryList();

            const messagesArea = document.getElementById('messagesArea');
            if (!messagesArea) return;
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message ai';
            loadingDiv.id = 'loadingMessage';
            loadingDiv.innerHTML = `<div class="message-content"><div class="loading-wrapper"><div class="loading-spinner"></div> Thinking...</div></div>`;

            const loading = document.getElementById('loadingMessage');

            isThinking = false;

        }
        
        // GROQ API CALL
        async function callGroq(userMessage, username) {
            try {
                const response = await fetch(GROQ_API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${GROQ_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: `${aiPersonality}\n\nUsername: ${username}` },
                            { role: "user", content: userMessage }
                        ],
                        temperature: 0.9,
                        max_tokens: 1000
                    })
                });
                
                if (!response.ok) throw new Error(`API Error: ${response.status}`);
                const data = await response.json();
                if (data.choices && data.choices[0]?.message?.content) {
                    return data.choices[0].message.content;
                }
                return `🦀 Maaf ${username}, aku error. Coba lagi! 🌊`;
            } catch (error) {
                console.error('Groq error:', error);
                return `🦀 Error koneksi, ${username}. Coba lagi! 🌊`;
            }
        }
        
        // SEND MESSAGE
        async function sendMessage(message) {
            if (!message.trim() || isThinking) return;
            
            addMessage("user", message);
            
            const messageInput = document.getElementById('messageInput');
            if (messageInput) {
                messageInput.value = '';
                messageInput.style.height = 'auto';
            }
            
            addLoadingMessage();
            const response = await callGroq(message, currentUser);
            removeLoadingMessage();
            addMessage("ai", response);
        }
        
        // CHAT MANAGEMENT
        function createNewChat() {
            currentChatId = Date.now().toString();
            conversations[currentChatId] = [];
            document.getElementById('messagesArea').innerHTML = '';
            addMessage("ai", `🦀 New conversation started. What would you like to discuss, ${currentUser}? 🌊`);
            if (db && currentUser) {
                db.ref(`conversations/${currentUser}/${currentChatId}`).set([]);
                updateChatHistoryList();
            }
        }
        
        function loadChat(chatId) {
            if (isThinking) return;
            currentChatId = chatId;
            const messagesArea = document.getElementById('messagesArea');
            messagesArea.innerHTML = '';
            const conv = conversations[chatId] || [];
            for (const msg of conv) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${msg.sender}`;
                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';
                
                if (msg.sender === 'ai') {
                    const parts = formatMessage(msg.content);
                    for (const part of parts) {
                        if (part.type === 'text') {
                            const textNode = document.createElement('div');
                            textNode.innerHTML = part.content.replace(/\n/g, '<br>');
                            contentDiv.appendChild(textNode);
                        } else if (part.type === 'code') {
                            const codeBlock = document.createElement('div');
                            codeBlock.className = 'code-block';
                            const pre = document.createElement('pre');
                            const code = document.createElement('code');
                            code.className = `language-${part.language}`;
                            code.textContent = part.code;
                            pre.appendChild(code);
                            codeBlock.appendChild(pre);
                            const copyBtn = document.createElement('button');
                            copyBtn.className = 'copy-btn';
                            copyBtn.innerHTML = '<i class="fas fa-copy"></i> Copy';
                            copyBtn.onclick = () => {
                                navigator.clipboard.writeText(part.code);
                                showNotification('Copied!');
                            };
                            codeBlock.appendChild(copyBtn);
                            contentDiv.appendChild(codeBlock);
                        }
                    }
                } else {
                    const textNode = document.createElement('div');
                    textNode.innerHTML = msg.content.replace(/\n/g, '<br>');
                    contentDiv.appendChild(textNode);
                }
                
                messageDiv.appendChild(contentDiv);
                messagesArea.appendChild(messageDiv);
            }
            messagesArea.scrollTop = messagesArea.scrollHeight;
            updateChatHistoryList();
            closeMenu();
        }
        
        function updateChatHistoryList() {
            const listContainer = document.getElementById('chatHistoryList');
            if (!listContainer) return;
            listContainer.innerHTML = '';
            const chatIds = Object.keys(conversations).reverse();
            for (const id of chatIds) {
                const firstMsg = conversations[id]?.find(m => m.sender === 'user');
                const title = firstMsg ? (firstMsg.content || '').substring(0, 30) + ((firstMsg.content || '').length > 30 ? '...' : '') : 'Empty chat';
                const date = new Date(parseInt(id)).toLocaleString();
                const item = document.createElement('div');
                item.className = `history-item ${currentChatId === id ? 'active' : ''}`;
                item.innerHTML = `<div class="history-title">${escapeHtml(title) || 'New chat'}</div><div class="history-date">${date}</div>`;
                item.onclick = () => loadChat(id);
                listContainer.appendChild(item);
            }
        }
        
        function loadConversationsFromFirebase() {
            if (!currentUser || !db) return;
            db.ref(`conversations/${currentUser}`).once('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    conversations = data;
                    const chatIds = Object.keys(conversations);
                    if (chatIds.length > 0) {
                        currentChatId = chatIds[0];
                        loadChat(currentChatId);
                    } else {
                        createNewChat();
                    }
                } else {
                    createNewChat();
                }
                updateChatHistoryList();
            });
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // MENU
        function openMenu() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('menuOverlay').classList.add('active');
        }
        
        function closeMenu() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('menuOverlay').classList.remove('active');
        }
        
        // LOGIN
        function handleLogin() {
            const u = document.getElementById('loginUsername').value.trim();
            const p = document.getElementById('loginPassword').value.trim();
            if (!u || !p) return showNotification('Fill all fields');
            const loginBtn = document.getElementById('loginBtn');
            loginBtn.classList.add('loading');
            if (db) {
                db.ref('registered_users/' + u).once('value').then(s => {
                    const d = s.val();
                    setTimeout(() => {
                        if (d && d.password === p && new Date().getTime() < d.expiry) {
                            currentUser = u;
                            localStorage.setItem('current_user', u);
                            localStorage.setItem('user_expiry', d.expiry);
                            document.getElementById('loginContainer').style.display = 'none';
                            document.getElementById('headerBar').style.display = 'flex';
                            document.getElementById('mainLayout').style.display = 'flex';
                            loginBtn.classList.remove('loading');
                            if (d.avatar) {
                                document.getElementById('loginProfilePic').src = d.avatar;
                                document.getElementById('headerProfilePic').src = d.avatar;
                            }
                            loadConversationsFromFirebase();
                            showNotification(`Welcome ${u}`);
                        } else {
                            loginBtn.classList.remove('loading');
                            showNotification('Invalid credentials or expired');
                        }
                    }, 1000);
                }).catch(() => {
                    loginBtn.classList.remove('loading');
                    showNotification('Connection error');
                });
            } else {
                setTimeout(() => {
                    loginBtn.classList.remove('loading');
                    showNotification('Firebase not ready');
                }, 1000);
            }
        }
        
        function logout() {
            localStorage.removeItem('current_user');
            localStorage.removeItem('user_expiry');
            document.getElementById('mainLayout').style.display = 'none';
            document.getElementById('headerBar').style.display = 'none';
            document.getElementById('loginContainer').style.display = 'flex';
            currentUser = null;
            showNotification('Logged out');
        }
        
        // INIT
        document.addEventListener('DOMContentLoaded', () => {
            loadProfileImage();
            document.getElementById('loginBtn')?.addEventListener('click', handleLogin);
            document.getElementById('logoutIconBtn')?.addEventListener('click', logout);
            document.getElementById('menuToggleBtn')?.addEventListener('click', openMenu);
            document.getElementById('menuOverlay')?.addEventListener('click', closeMenu);
            document.getElementById('newChatSidebarBtn')?.addEventListener('click', () => { createNewChat(); closeMenu(); });
            document.getElementById('sendBtn')?.addEventListener('click', () => sendMessage(document.getElementById('messageInput')?.value || ''));
            document.getElementById('stopBtn')?.addEventListener('click', stopThinking);
            
            const messageInput = document.getElementById('messageInput');
            if (messageInput) {
                messageInput.addEventListener('input', function() {
                    this.style.height = 'auto';
                    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
                });
                messageInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey && !isThinking) {
                        e.preventDefault();
                        sendMessage(messageInput.value);
                    }
                });
            }
            
            const saved = localStorage.getItem('current_user');
            if (saved) {
                const exp = localStorage.getItem('user_expiry');
                if (exp && new Date().getTime() < parseInt(exp)) {
                    currentUser = saved;
                    document.getElementById('loginContainer').style.display = 'none';
                    document.getElementById('headerBar').style.display = 'flex';
                    document.getElementById('mainLayout').style.display = 'flex';
                    loadConversationsFromFirebase();
                }
            }
            
            if ('virtualKeyboard' in navigator) navigator.virtualKeyboard.overlaysContent = true;
            let originalHeight = window.innerHeight;
            window.addEventListener('resize', () => {
                const messagesArea = document.getElementById('messagesArea');
                if (window.innerHeight < originalHeight && messagesArea) {
                    setTimeout(() => messagesArea.scrollTop = messagesArea.scrollHeight, 100);
                }
                originalHeight = window.innerHeight;
            });
        });
    </script>
</body>
</html>
