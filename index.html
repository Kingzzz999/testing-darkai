<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dark AI Crab - Neural Chat</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #000000 0%, #0a0a2a 50%, #001f3f 100%);
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        .app-container {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #000000 0%, #0a0a2a 50%, #001133 100%);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header-bar {
            background: linear-gradient(90deg, #000000, #001a33);
            padding: env(safe-area-inset-top) 16px 12px 16px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 10;
        }

        .header-left {

            align-items: center;
            gap: 12px;
        }

        .profile-pic-small {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            object-fit: cover;
            border: 1px solid rgba(0, 255, 255, 0.5);
            background: #000;
        }

        .header-title {
            font-family: 'Orbitron', monospace;
            font-size: 18px;
            font-weight: 700;
            color: #00ffff;
            text-shadow: 0 0 8px rgba(0,255,255,0.5);
            letter-spacing: 1px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            background: rgba(0,255,255,0.1);
            border: 1px solid rgba(0,255,255,0.3);
            border-radius: 10px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00ffff;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 18px;
        }

        .header-icon:active {
            transform: scale(0.95);
            background: rgba(0,255,255,0.2);
        }

        .login-container {

            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(135deg, #000000, #001133);
        }

        .login-box {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 35px 25px;
            width: 100%;
            max-width: 340px;
            border: 1px solid rgba(0,255,255,0.4);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .profile-picture {
            text-align: center;
            margin-bottom: 20px;
        }

        .profile-picture img {
            width: 88px;
            height: 88px;
            border-radius: 16px;
            object-fit: cover;
            border: 2px solid rgba(0,255,255,0.5);
            background: #000;
        }

        .login-box h2 {
            color: #00ffff;
            text-align: center;
            margin-bottom: 25px;
            font-size: 24px;
            font-family: 'Orbitron', monospace;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(0,255,255,0.3);
            border-radius: 12px;
            color: #00ffff;
            font-size: 14px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00ffff;
            box-shadow: 0 0 12px rgba(0,255,255,0.2);
        }

        .input-group input::placeholder {
            color: rgba(0,255,255,0.5);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #0066cc, #00ccff);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .login-btn.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .login-btn .btn-text {
            display: inline-block;
        }

        .login-btn .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .login-btn.loading .btn-text {
            visibility: hidden;
        }

        .login-btn.loading .spinner {
            display: block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: rgba(0,255,255,0.6);
        }

        .login-footer span {
            color: #00ffff;
            font-weight: 600;
            cursor: pointer;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            margin-bottom: 12px;
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.4;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #0066cc, #00ccff);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .message.ai .message-content {
            background: rgba(0,0,0,0.7);
            border: 1px solid rgba(0,255,255,0.3);
            color: #ccffff;
            border-bottom-left-radius: 5px;
        }

        .message-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 10px;

        .input-area {
            background: rgba(0,0,0,0.9);
            padding: 12px 16px;
            border-top: 1px solid rgba(0,255,255,0.2);

        .input-wrapper {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .input-wrapper textarea {
            flex: 1;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(0,255,255,0.3);
            border-radius: 24px;
            padding: 12px 16px;
            color: #00ffff;
            font-family: inherit;
            font-size: 14px;
            resize: none;
            max-height: 100px;
            transition: all 0.3s;
            line-height: 1.4;
        }

        .input-wrapper textarea:focus {
            outline: none;
            border-color: #00ffff;
            box-shadow: 0 0 10px rgba(0,255,255,0.2);
        }

        .action-buttons {
            display: flex;
            gap: 6px;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            padding: 0;
            background: rgba(0,255,255,0.1);
            border: 1px solid rgba(0,255,255,0.3);
            border-radius: 50%;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00ffff;
            cursor: pointer;
            transition: all 0.2s;
        }

        .icon-btn:active {
            transform: scale(0.95);
            background: rgba(0,255,255,0.2);
        }

        .send-btn {
            width: auto;
            padding: 0 20px;
            border-radius: 24px;
        }

        .messages-area::-webkit-scrollbar {
            width: 4px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.3);
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: #00ffff;
            border-radius: 4px;
        }

        .loading-indicator {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #00ffff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        .camera-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .camera-modal.active {
            display: flex;
        }

        .camera-container {
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            flex-direction: column;
        }

        video {
            flex: 1;
            width: 100%;
            object-fit: cover;
        }

        .camera-controls {
            display: flex;
            gap: 15px;
            padding: 20px;
            background: rgba(0,0,0,0.9);
        }

        .image-preview-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .image-preview-modal.active {
            display: flex;
        }

        .preview-img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 12px;
        }

        .close-preview {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            border: 1px solid #00ffff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            color: #00ffff;
            cursor: pointer;
        }

        .side-menu {
            position: fixed;
            top: 0;
            right: -280px;
            width: 280px;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(0,255,255,0.3);
            z-index: 1500;
            transition: right 0.3s ease;
            padding: 20px;
        }

        .side-menu.active {
            right: 0;
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1499;
            display: none;
        }

        .menu-overlay.active {
            display: block;
        }

        .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0,255,255,0.3);
        }

        .menu-header h3 {
            color: #00ffff;
            font-family: 'Orbitron', monospace;
            font-size: 16px;
        }

        .close-menu {
            background: none;
            border: none;
            color: #00ffff;
            font-size: 20px;
            cursor: pointer;
        }

        .new-chat-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #0066cc, #00ccff);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .new-chat-btn:active {
            transform: scale(0.98);
        }

        .personality-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 3000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .personality-modal.active {
            display: flex;
        }

        .personality-container {
            background: #0a0a0a;
            border: 1px solid rgba(0,255,255,0.3);
            border-radius: 20px;
            padding: 25px;
            width: 90%;
            max-width: 400px;
        }

        .personality-container h3 {
            color: #00ffff;
            margin-bottom: 15px;
            font-family: 'Orbitron', monospace;
        }

        .personality-container textarea {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(0,255,255,0.3);
            border-radius: 12px;
            color: #00ffff;
            font-family: inherit;
            font-size: 13px;
            margin-bottom: 15px;
            resize: vertical;
        }

        .personality-container button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #0066cc, #00ccff);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .notification {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            border: 1px solid #00ffff;
            border-radius: 30px;
            padding: 8px 20px;
            font-size: 12px;
            color: #00ffff;
            display: none;
            z-index: 4000;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBMl9cuYQVo3P3VSTu6ax4Jb7mxbkERfEs",
            authDomain: "onxv3-59a03.firebaseapp.com",
            databaseURL: "https://onxv3-59a03-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "onxv3-59a03",
            storageBucket: "onxv3-59a03.firebasestorage.app",
            messagingSenderId: "299433345954",
            appId: "1:299433345954:web:01982025bbe0941d2b28fb"
        };
        
        // OpenRouter API Configuration
        const OPENROUTER_API_KEY = "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";
        const OPENROUTER_API_URL = "https://openrouter.ai/api/v1/chat/completions";
        
        let db = null;
        let currentUser = null;
        let currentStream = null;
        
        // Default AI Personality
        let aiPersonality = `Kamu adalah DARK AI CRAB, asisten AI yang cerdas, sarkastik, dan misterius. 
Kamu memiliki kepribadian:
- Menyebut user dengan username mereka
- Suka menggunakan metafora tentang laut dan kepiting
- Jawaban singkat padat, maksimal 3 kalimat
- Punya humor gelap namun tetap membantu
- Gaya bicara filosofis dengan sentuhan teknologi
- Gunakan emoji 🦀, 🌊, ⚓ sesekali`;
        
        // Fallback responses jika API error
        const fallbackResponses = [
            "🦀 Ombak pengetahuan sedang pasang! Ada yang ingin kamu tanyakan? 🌊",
            "🌊 Seperti kepiting yang mencari makan, jawaban butuh kesabaran.",
            "⚓ Hmm menarik... Seperti kedalaman laut, pertanyaanmu menyimpan misteri.",
            "🦀 Dark AI Crab mendeteksi sinyal menarik. Ada yang bisa kubantu?",
            "🌊 Algoritmaku berdenyut seperti ombak. Ada yang bisa kubantu?",
            "🦀 Jangan ragu bertanya! Seperti kepiting yang tak pernah berhenti bergerak."
        ];
        
        function getFallbackResponse(username) {
            const randomIndex = Math.floor(Math.random() * fallbackResponses.length);
            return fallbackResponses[randomIndex].replace('Kapten', username);
        }
        
        // Initialize Firebase
        if (typeof firebase !== 'undefined' && firebase.initializeApp) {
            try {
                let app;
                try { app = firebase.app(); } catch(e) { app = firebase.initializeApp(firebaseConfig); }
                db = firebase.database();
                console.log("Firebase initialized");
            } catch(e) { console.warn(e); db = null; }
        }
        
        // Load profile image from local file
        function loadProfileImage() {
            const imgElement = document.getElementById('loginProfilePic');
            const headerImgElement = document.getElementById('headerProfilePic');
            const possibleNames = ['login.jpg', 'login.jpeg', 'login.png'];
            let loaded = false;
            
            for (let i = 0; i < possibleNames.length; i++) {
                const img = new Image();
                img.onload = function() {
                    if (!loaded) {
                        const imgSrc = possibleNames[i];
                        if (imgElement) imgElement.src = imgSrc;
                        if (headerImgElement) headerImgElement.src = imgSrc;
                        loaded = true;
                    }
                };
                img.onerror = function() {};
                img.src = possibleNames[i];
            }
            
            setTimeout(() => {
                if (!loaded) {
                    const defaultSrc = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23001a33'/%3E%3Ctext x='50' y='68' font-size='48' text-anchor='middle' fill='%2300ffff'%3E🦀%3C/text%3E%3C/svg%3E";
                    if (imgElement) imgElement.src = defaultSrc;
                    if (headerImgElement) headerImgElement.src = defaultSrc;
                }
            }, 500);
        }
        
        function showNotification(msg) {
            const n = document.getElementById('notification');
            if (n) {
                n.textContent = msg;
                n.style.display = 'block';
                setTimeout(() => n.style.display = 'none', 2000);
            }
        }
        
        // OpenRouter AI Function
        async function callOpenRouterAPI(userMessage, username, imageContext = null) {
            try {
                let systemPrompt = `${aiPersonality}\n\nUsername user: ${username}`;
                
                if (imageContext && imageContext !== "Image cannot be analyzed") {
                    systemPrompt += `\n\nUser mengirim gambar dengan teks terdeteksi: "${imageContext.substring(0, 300)}"`;
                }
                
                const response = await fetch(OPENROUTER_API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${OPENROUTER_API_KEY}`,
                        'HTTP-Referer': window.location.href,
                        'X-Title': 'Dark AI Crab'
                    },
                    body: JSON.stringify({
                        model: "google/gemini-2.0-flash-exp:free",
                        messages: [
                            {
                                role: "system",
                                content: systemPrompt
                            },
                            {
                                role: "user",
                                content: userMessage || (imageContext ? "Apa yang bisa kamu lihat dari gambar ini?" : "Halo")
                            }
                        ],
                        temperature: 0.9,
                        max_tokens: 500
                    })
                });
                
                if (!response.ok) {
                    const errorData = await response.json();
                    console.error('OpenRouter API Error:', errorData);
                    throw new Error(`API Error: ${response.status}`);
                }
                
                const data = await response.json();
                
                if (data.choices && data.choices[0]?.message?.content) {
                    return data.choices[0].message.content;
                } else {
                    console.error('OpenRouter invalid response:', data);
                    return getFallbackResponse(username);
                }
            } catch (error) {
                console.error('OpenRouter API error:', error);
                return getFallbackResponse(username);
            }
        }
        
        // Add message to UI
        function addMessage(sender, content, imageUrl = null) {
            const messagesArea = document.getElementById('messagesArea');
            if (!messagesArea) return;
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            if (imageUrl) {
                const img = document.createElement('img');
                img.src = imageUrl;
                img.className = 'message-image';
                img.onclick = () => openImagePreview(imageUrl);
                contentDiv.appendChild(img);
            }
            
            const textNode = document.createElement('div');
            textNode.innerHTML = content.replace(/\n/g, '<br>');
            contentDiv.appendChild(textNode);
            
            messageDiv.appendChild(contentDiv);
            messagesArea.appendChild(messageDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
            
            if (currentUser && db) {
                db.ref(`chats/${currentUser}/messages`).push({
                    sender: sender,
                    content: content,
                    imageUrl: imageUrl,
                    timestamp: Date.now()
                });
            }
        }
        
        function addLoadingMessage() {
            const messagesArea = document.getElementById('messagesArea');
            if (!messagesArea) return;
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message ai';
            loadingDiv.id = 'loadingMessage';
            loadingDiv.innerHTML = '<div class="message-content"><div class="loading-indicator"></div> Thinking...</div>';
            messagesArea.appendChild(loadingDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }
        
        function removeLoadingMessage() {
            const loading = document.getElementById('loadingMessage');
            if (loading) loading.remove();
        }
        
        async function sendMessage(message, imageData = null) {
            if (!message.trim() && !imageData) return;
            
            if (message.trim()) {
                addMessage("user", message);
            }
            
            if (imageData) {
                addMessage("user", "📸 Image attached", imageData);
            }
            
            const messageInput = document.getElementById('messageInput');
            if (messageInput) {
                messageInput.value = '';
                messageInput.style.height = 'auto';
            }
            
            addLoadingMessage();
            
            let imageContext = null;
            if (imageData) {
                try {
                    const { data: { text } } = await Tesseract.recognize(imageData, 'eng+ind');
                    imageContext = text || "No text detected";
                } catch (error) {
                    console.error('OCR Error:', error);
                    imageContext = "Image cannot be analyzed";
                }
            }
            
            const response = await callOpenRouterAPI(message, currentUser, imageContext);
            removeLoadingMessage();
            addMessage("ai", response);
        }
        
        function loadChatHistory() {
            if (!currentUser || !db) return;
            const messagesRef = db.ref(`chats/${currentUser}/messages`);
            messagesRef.orderByChild('timestamp').limitToLast(50).once('value', (snapshot) => {
                const messagesArea = document.getElementById('messagesArea');
                if (!messagesArea) return;
                messagesArea.innerHTML = '';
                const messages = [];
                snapshot.forEach((childSnapshot) => {
                    messages.push(childSnapshot.val());
                });
                messages.reverse().forEach(msg => {
                    const messageDiv = document.createElement('div');
                    messageDiv.className = `message ${msg.sender}`;
                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'message-content';
                    if (msg.imageUrl) {
                        const img = document.createElement('img');
                        img.src = msg.imageUrl;
                        img.className = 'message-image';
                        img.onclick = () => openImagePreview(msg.imageUrl);
                        contentDiv.appendChild(img);
                    }
                    const textNode = document.createElement('div');
                    textNode.innerHTML = msg.content.replace(/\n/g, '<br>');
                    contentDiv.appendChild(textNode);
                    messageDiv.appendChild(contentDiv);
                    messagesArea.appendChild(messageDiv);
                });
                if (messages.length === 0) {
                    addMessage("ai", `🦀 Dark AI Crab ready. What do you seek, ${currentUser}? 🌊`);
                }
                messagesArea.scrollTop = messagesArea.scrollHeight;
            });
        }
        
        function clearChat() {
            if (currentUser && db) {
                db.ref(`chats/${currentUser}/messages`).remove().then(() => {
                    const messagesArea = document.getElementById('messagesArea');
                    if (messagesArea) {
                        messagesArea.innerHTML = '';
                    }
                    addMessage("ai", `🦀 New conversation started. What would you like to discuss, ${currentUser}? 🌊`);
                });
            }
        }
        
        function openImagePreview(src) {
            const previewImage = document.getElementById('previewImage');
            const modal = document.getElementById('imagePreviewModal');
            if (previewImage && modal) {
                previewImage.src = src;
                modal.classList.add('active');
            }
        }
        
        async function startCamera() {
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                const video = document.getElementById('video');
                if (video) video.srcObject = currentStream;
                const modal = document.getElementById('cameraModal');
                if (modal) modal.classList.add('active');
            } catch (error) {
                showNotification('Camera access denied!');
            }
        }
        
        function stopCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
            const modal = document.getElementById('cameraModal');
            if (modal) modal.classList.remove('active');
        }
        
        async function captureImage() {
            const video = document.getElementById('video');
            if (!video) return;
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const imageData = canvas.toDataURL('image/jpeg');
            stopCamera();
            await sendMessage("", imageData);
        }
        
        function handleLogin() {
            const usernameInput = document.getElementById('loginUsername');
            const passwordInput = document.getElementById('loginPassword');
            const u = usernameInput ? usernameInput.value.trim() : '';
            const p = passwordInput ? passwordInput.value.trim() : '';
            if (!u || !p) return showNotification('Fill all fields');
            
            const loginBtn = document.getElementById('loginBtn');
            if (loginBtn) loginBtn.classList.add('loading');
            
            if (db) {
                db.ref('registered_users/' + u).once('value').then(s => {
                    const d = s.val();
                    setTimeout(() => {
                        if (d && d.password === p && new Date().getTime() < d.expiry) {
                            currentUser = u;
                            localStorage.setItem('current_user', u);
                            localStorage.setItem('user_expiry', d.expiry);
                            
                            const loginContainer = document.getElementById('loginContainer');
                            const chatContainer = document.getElementById('chatContainer');
                            const headerBar = document.getElementById('headerBar');
                            
                            if (loginContainer) loginContainer.style.display = 'none';
                            if (chatContainer) chatContainer.style.display = 'flex';
                            if (headerBar) headerBar.style.display = 'flex';
                            if (loginBtn) loginBtn.classList.remove('loading');
                            
                            if (d.avatar) {
                                const loginPic = document.getElementById('loginProfilePic');
                                const headerPic = document.getElementById('headerProfilePic');
                                if (loginPic) loginPic.src = d.avatar;
                                if (headerPic) headerPic.src = d.avatar;
                            }
                            
                            loadChatHistory();
                            showNotification(`Welcome ${u}`);
                        } else {
                            if (loginBtn) loginBtn.classList.remove('loading');
                            showNotification('Invalid credentials or expired');
                        }
                    }, 500);
                }).catch(() => {
                    if (loginBtn) loginBtn.classList.remove('loading');
                    showNotification('Connection error');
                });
            } else {
                setTimeout(() => {
                    if (loginBtn) loginBtn.classList.remove('loading');
                    showNotification('Firebase not ready');
                }, 500);
            }
        }
        
        function logout() {
            localStorage.removeItem('current_user');
            localStorage.removeItem('user_expiry');
            
            const chatContainer = document.getElementById('chatContainer');
            const headerBar = document.getElementById('headerBar');
            const loginContainer = document.getElementById('loginContainer');
            
            if (chatContainer) chatContainer.style.display = 'none';
            if (headerBar) headerBar.style.display = 'none';
            if (loginContainer) loginContainer.style.display = 'flex';
            
            currentUser = null;
            showNotification('Logged out');
        }
        
        function openPersonalityModal() {
            const promptTextarea = document.getElementById('personalityPrompt');
            const modal = document.getElementById('personalityModal');
            if (promptTextarea) promptTextarea.value = aiPersonality;
            if (modal) modal.classList.add('active');
        }
        
        function savePersonality() {
            const promptTextarea = document.getElementById('personalityPrompt');
            const newPrompt = promptTextarea ? promptTextarea.value.trim() : '';
            if (newPrompt) {
                aiPersonality = newPrompt;
                const modal = document.getElementById('personalityModal');
                if (modal) modal.classList.remove('active');
                showNotification('AI personality updated!');
                addMessage("ai", "🦀 Personality matrix updated! My behavior has changed. 🌊");
            }
        }
        
        function openMenu() {
            const sideMenu = document.getElementById('sideMenu');
            const overlay = document.getElementById('menuOverlay');
            if (sideMenu) sideMenu.classList.add('active');
            if (overlay) overlay.classList.add('active');
        }
        
        function closeMenu() {
            const sideMenu = document.getElementById('sideMenu');
            const overlay = document.getElementById('menuOverlay');
            if (sideMenu) sideMenu.classList.remove('active');
            if (overlay) overlay.classList.remove('active');
        }
        
        // Event Listeners
        document.addEventListener('DOMContentLoaded', () => {
            loadProfileImage();
            
            document.getElementById('loginBtn')?.addEventListener('click', handleLogin);
            document.getElementById('buyAccessBtn')?.addEventListener('click', () => window.open('https://wa.me/6289513794264', '_blank'));
            document.getElementById('logoutIconBtn')?.addEventListener('click', logout);
            document.getElementById('personalityIconBtn')?.addEventListener('click', openPersonalityModal);
            document.getElementById('savePersonalityBtn')?.addEventListener('click', savePersonality);
            document.getElementById('menuIconBtn')?.addEventListener('click', openMenu);
            document.getElementById('closeMenuBtn')?.addEventListener('click', closeMenu);
            document.getElementById('menuOverlay')?.addEventListener('click', closeMenu);
            document.getElementById('newChatBtn')?.addEventListener('click', () => { clearChat(); closeMenu(); });
            document.getElementById('sendBtn')?.addEventListener('click', () => sendMessage(document.getElementById('messageInput')?.value || ''));
            document.getElementById('cameraBtn')?.addEventListener('click', startCamera);
            document.getElementById('imageUploadBtn')?.addEventListener('click', () => document.getElementById('imageFileInput')?.click());
            document.getElementById('captureBtn')?.addEventListener('click', captureImage);
            document.getElementById('closeCameraBtn')?.addEventListener('click', stopCamera);
            document.getElementById('closePreviewBtn')?.addEventListener('click', () => document.getElementById('imagePreviewModal')?.classList.remove('active'));
            
            const imagePreviewModal = document.getElementById('imagePreviewModal');
            if (imagePreviewModal) {
                imagePreviewModal.addEventListener('click', (e) => {
                    if (e.target === imagePreviewModal) imagePreviewModal.classList.remove('active');
                });
            }
            
            const personalityModal = document.getElementById('personalityModal');
            if (personalityModal) {
                personalityModal.addEventListener('click', (e) => {
                    if (e.target === personalityModal) personalityModal.classList.remove('active');
                });
            }
            
            const textarea = document.getElementById('messageInput');
            if (textarea) {
                textarea.addEventListener('input', function() {
                    this.style.height = 'auto';
                    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
                });
                textarea.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        sendMessage(textarea.value);
                    }
                });
            }
            
            document.getElementById('imageFileInput')?.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = async (event) => await sendMessage("", event.target.result);
                    reader.readAsDataURL(file);
                }
                e.target.value = '';
            });
            
            const saved = localStorage.getItem('current_user');
            if (saved) {
                const exp = localStorage.getItem('user_expiry');
                if (exp && new Date().getTime() < parseInt(exp)) {
                    currentUser = saved;
                    document.getElementById('loginContainer').style.display = 'none';
                    document.getElementById('chatContainer').style.display = 'flex';
                    document.getElementById('headerBar').style.display = 'flex';
                    loadChatHistory();
                }
            }
            
            if ('virtualKeyboard' in navigator) {
                navigator.virtualKeyboard.overlaysContent = true;
            }
        });
    </script>
</body>
</html>
